spring:
  datasource:
    url: jdbc:h2:mem:flowlet;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: flowlet
  flyway:
    enabled: true
    default-schema: flowlet
    schemas: flowlet

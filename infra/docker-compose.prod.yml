name: flowlet-prod

services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    container_name: ${FLOWLET_DB_CONTAINER_NAME:-flowlet-db-prod}
    environment:
      POSTGRES_DB: ${FLOWLET_DB_NAME:-flowlet_prod}
      POSTGRES_USER: ${FLOWLET_DB_USER:-flowlet}
      POSTGRES_PASSWORD: ${FLOWLET_DB_PASSWORD:-flowlet}
    ports:
      - "${FLOWLET_DB_PORT:-5433}:5432"
    volumes:
      - flowlet-db-prod-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FLOWLET_DB_USER:-flowlet} -d ${FLOWLET_DB_NAME:-flowlet_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: infra/docker/app.Dockerfile
    restart: unless-stopped
    container_name: flowlet-app-prod
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      FLOWLET_DB_HOST: db
      FLOWLET_DB_PORT: 5432
      FLOWLET_DB_NAME: ${FLOWLET_DB_NAME:-flowlet_prod}
      FLOWLET_DB_USER: ${FLOWLET_DB_USER:-flowlet}
      FLOWLET_DB_PASSWORD: ${FLOWLET_DB_PASSWORD:-flowlet}
      FLOWLET_DB_SCHEMA: ${FLOWLET_DB_SCHEMA:-flowlet}
      FLOWLET_GITHUB_TOKEN: ${FLOWLET_GITHUB_TOKEN:-}
      FLOWLET_GITHUB_REPOSITORY: ${FLOWLET_GITHUB_REPOSITORY:-jacksonis16019207-glitch/flowlet}
    ports:
      - "8081:8080"

volumes:
  flowlet-db-prod-data:

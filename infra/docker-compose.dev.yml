name: flowlet-dev

services:
  db:
    image: postgres:18-alpine
    container_name: ${FLOWLET_DB_CONTAINER_NAME:-flowlet-db-dev}
    environment:
      POSTGRES_DB: ${FLOWLET_DB_NAME:-flowlet_dev}
      POSTGRES_USER: ${FLOWLET_DB_USER:-flowlet}
      POSTGRES_PASSWORD: ${FLOWLET_DB_PASSWORD:-flowlet}
    ports:
      - "${FLOWLET_DB_PORT:-5432}:5432"
    volumes:
      - flowlet-db-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FLOWLET_DB_USER:-flowlet} -d ${FLOWLET_DB_NAME:-flowlet_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  flowlet-db-dev-data:
